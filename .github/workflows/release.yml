name: Release (macOS DMG)

# Build the Minitor desktop app for macOS (Apple Silicon) and attach the DMG to
# a GitHub Release. Triggered by pushing a version tag, e.g. v0.4.0.
#
# Intel (x86_64) is not built: GitHub's Intel macOS runners are being retired and
# jobs sit queued indefinitely. Apple Silicon covers Macs from 2020 on; Intel
# users can run from source (see README).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14          # Apple Silicon
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/src-tauri/target
          key: macos-14-cargo-${{ hashFiles('desktop/src-tauri/Cargo.toml') }}

      # Install JS deps for the root (pkg/esbuild) and the desktop (tauri CLI).
      - name: Install dependencies
        run: |
          npm ci
          npm --prefix desktop ci || npm --prefix desktop install

      # Bundle + pkg + ad-hoc sign the Node sidecar.
      - name: Build minitor sidecar
        run: npm run build:sidecar:arm64

      # Build the .app + .dmg (Tauri ad-hoc signs the bundle).
      - name: Build Tauri app
        working-directory: desktop
        run: npm run tauri build

      - name: Locate DMG
        id: dmg
        run: |
          DMG=$(find desktop/src-tauri/target -name '*.dmg' | head -1)
          echo "path=$DMG" >> "$GITHUB_OUTPUT"
          echo "Found: $DMG"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.dmg.outputs.path }}
          fail_on_unmatched_files: true
