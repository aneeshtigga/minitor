name: Release

# Build the Minitor desktop app for macOS (Apple Silicon), Windows (x64) and
# Linux (x64), and attach the installers to a GitHub Release. Triggered by
# pushing a version tag, e.g. v0.4.1.
#
# Each OS builds on its own native runner (Tauri can't cross-compile). Intel
# macOS (x86_64) is omitted — GitHub's macos-13 runners sit queued indefinitely;
# Intel Mac users can run from source.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            platform: macos
            sidecar: build:sidecar:arm64
            rust_target: aarch64-apple-darwin
          - runner: windows-latest
            platform: windows
            sidecar: build:sidecar:win
            rust_target: x86_64-pc-windows-msvc
          - runner: ubuntu-22.04
            platform: linux
            sidecar: build:sidecar:linux
            rust_target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      # Single source of truth: derive the app version from the git tag (v0.4.1
      # -> 0.4.1) and stamp it into tauri.conf.json + Cargo.toml so the built
      # installers are ALWAYS named to match the release. (On manual runs with
      # no tag, the committed version is kept.)
      - name: Sync version to tag
        shell: bash
        run: |
          REF="${GITHUB_REF_NAME:-}"
          if [[ "$REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            VER="${REF#v}"
            echo "Stamping version $VER (from tag $REF)"
            # tauri.conf.json: top-level "version": "x.y.z"
            perl -0pi -e 's/("version"\s*:\s*)"[0-9]+\.[0-9]+\.[0-9]+"/${1}"'"$VER"'"/' desktop/src-tauri/tauri.conf.json
            # Cargo.toml: the [package] version (first `version = "..."`)
            perl -0pi -e 's/^version = "[0-9]+\.[0-9]+\.[0-9]+"/version = "'"$VER"'"/m' desktop/src-tauri/Cargo.toml
            grep -H '"version"' desktop/src-tauri/tauri.conf.json | head -1
            grep -H '^version' desktop/src-tauri/Cargo.toml | head -1
          else
            echo "No version tag on this ref ($REF) — keeping committed version."
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      # Tauri's Linux build needs GTK/WebKit + packaging tools.
      - name: Install Linux system deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/src-tauri/target
          key: ${{ matrix.runner }}-cargo-${{ hashFiles('desktop/src-tauri/Cargo.toml') }}

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix desktop ci || npm --prefix desktop install

      # Bundle + pkg the Node sidecar for this platform (macOS also ad-hoc signs).
      - name: Build minitor sidecar
        run: npm run ${{ matrix.sidecar }}

      - name: Build Tauri app
        working-directory: desktop
        run: npm run tauri build

      # Collect installers under STABLE, version-less names so the README can
      # link to /releases/latest/download/<name> and never go stale. Tauri bakes
      # the version into its filenames; we rename to one canonical name per
      # artifact (no versioned duplicates — the release tag/title carries the version).
      - name: Collect installers
        shell: bash
        run: |
          mkdir -p artifacts
          BUNDLE=desktop/src-tauri/target/release/bundle
          if [ ! -d "$BUNDLE" ]; then
            echo "::error::No bundle directory at $BUNDLE — Tauri produced no installer."
            echo "Contents of target/release:"; ls -la desktop/src-tauri/target/release || true
            exit 1
          fi
          # grab(<glob> <dest>): copy the single matching installer to a stable name.
          grab() {
            local src; src=$(find "$BUNDLE" -type f -name "$1" | head -1)
            [ -n "$src" ] || { echo "::error::No installer matched $1"; exit 1; }
            cp "$src" "artifacts/$2"
          }
          case "${{ matrix.platform }}" in
            macos)
              grab '*.dmg'        Minitor-macOS-arm64.dmg ;;
            windows)
              grab '*-setup.exe'  Minitor-Windows-x64-setup.exe
              grab '*.msi'        Minitor-Windows-x64.msi ;;
            linux)
              grab '*.AppImage'   Minitor-Linux-x86_64.AppImage
              grab '*.deb'        Minitor-Linux-x86_64.deb
              grab '*.rpm'        Minitor-Linux-x86_64.rpm ;;
          esac
          echo "Collected:"; ls -lh artifacts

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          fail_on_unmatched_files: true
