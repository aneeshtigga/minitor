name: Release (macOS DMG)

# Build the Minitor desktop app for macOS (Apple Silicon + Intel) and attach the
# DMGs to a GitHub Release. Triggered by pushing a version tag, e.g. v0.4.0.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14            # Apple Silicon
            arch: aarch64
            rust_target: aarch64-apple-darwin
            sidecar_script: build:sidecar:arm64
          - runner: macos-13            # Intel
            arch: x86_64
            rust_target: x86_64-apple-darwin
            sidecar_script: build:sidecar:x64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/src-tauri/target
          key: ${{ matrix.runner }}-cargo-${{ hashFiles('desktop/src-tauri/Cargo.toml') }}

      # Install JS deps for the root (pkg/esbuild) and the desktop (tauri CLI).
      - name: Install dependencies
        run: |
          npm ci
          npm --prefix desktop ci || npm --prefix desktop install

      # Bundle + pkg + ad-hoc sign the Node sidecar for this arch.
      - name: Build minitor sidecar
        run: npm run ${{ matrix.sidecar_script }}

      # Build the .app + .dmg (Tauri ad-hoc signs the bundle). Each runner is
      # already native to its arch, so no --target cross-compile is needed.
      - name: Build Tauri app
        working-directory: desktop
        run: npm run tauri build

      - name: Locate DMG
        id: dmg
        run: |
          DMG=$(find desktop/src-tauri/target -name '*.dmg' | head -1)
          echo "path=$DMG" >> "$GITHUB_OUTPUT"
          echo "Found: $DMG"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.dmg.outputs.path }}
          fail_on_unmatched_files: true
